# Alembic configuration. The DB URL is NOT set here — env.py reads it from
# settings (which loads .env), so secrets never live in this file.

[alembic]
script_location = data/migrations
prepend_sys_path = .
path_separator = os
# Revision filenames: zero-padded order + slug, e.g. 0001_initial_schema.py
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
